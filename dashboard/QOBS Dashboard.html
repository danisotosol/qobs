<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QOBS — Quantum Job Observability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: oklch(0.16 0.012 250);
    --bg-1: oklch(0.19 0.014 250);
    --bg-2: oklch(0.22 0.016 250);
    --bg-3: oklch(0.26 0.018 250);
    --line: oklch(0.30 0.018 250);
    --line-soft: oklch(0.24 0.016 250);
    --fg-0: oklch(0.96 0.005 250);
    --fg-1: oklch(0.78 0.012 250);
    --fg-2: oklch(0.60 0.014 250);
    --fg-3: oklch(0.46 0.014 250);

    --accent: oklch(0.82 0.14 200);
    --accent-dim: oklch(0.82 0.14 200 / 0.18);
    --accent-line: oklch(0.82 0.14 200 / 0.45);
    --magenta: oklch(0.74 0.16 340);
    --amber: oklch(0.82 0.14 80);
    --green: oklch(0.80 0.14 150);
    --red: oklch(0.72 0.16 25);

    --radius: 6px;
    --radius-lg: 10px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-0);
    color: var(--fg-0);
    font-family: "Inter", system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

  /* Subtle grid texture on body — barely visible scientific/blueprint feel */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, oklch(1 0 0 / 0.012) 1px, transparent 1px),
      linear-gradient(to bottom, oklch(1 0 0 / 0.012) 1px, transparent 1px);
    background-size: 48px 48px;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ---- mock "API" -----------------------------------------------------------
// (Logic intentionally kept simple so styling is the focus.)
const BACKENDS = ["ibm_kyoto", "ibm_brisbane", "ionq_aria-1", "rigetti_ankaa-2", "quantinuum_h2"];
const STATUSES = ["completed", "running", "queued", "failed", "completed", "completed"];
const USERS = ["a.chen", "m.okafor", "s.patel", "k.larsen", "r.weiss", "j.tanaka"];

function rand(seed) {
  // deterministic-ish pseudo-random
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function generateJobs(n = 24) {
  const jobs = [];
  for (let i = 0; i < n; i++) {
    const s = STATUSES[Math.floor(rand(i + 1) * STATUSES.length)];
    const qubits = [5, 7, 12, 16, 27, 53, 127][Math.floor(rand(i + 7) * 7)];
    const shots = [1024, 2048, 4096, 8192, 16384][Math.floor(rand(i + 13) * 5)];
    const fidelity = s === "completed" ? 0.82 + rand(i + 21) * 0.17 : null;
    const runtime = s === "queued" ? null : Math.round(rand(i + 31) * 1800 + 30);
    const queueDepth = s === "queued" ? Math.floor(rand(i + 41) * 40) + 1 : 0;
    jobs.push({
      id: "qjob_" + (0xa3f200 + i * 17).toString(16),
      backend: BACKENDS[Math.floor(rand(i + 3) * BACKENDS.length)],
      status: s,
      qubits,
      shots,
      fidelity,
      runtime,
      queueDepth,
      user: USERS[Math.floor(rand(i + 5) * USERS.length)],
      submitted: new Date(Date.now() - i * 1000 * 60 * (3 + rand(i) * 9)),
    });
  }
  return jobs;
}

function generateThroughput(points = 48) {
  const out = [];
  for (let i = 0; i < points; i++) {
    const t = i / (points - 1);
    const base = 22 + Math.sin(t * Math.PI * 2.2) * 8 + Math.sin(t * Math.PI * 7) * 3;
    const success = Math.max(0, Math.round(base + rand(i + 100) * 6));
    const failed = Math.max(0, Math.round(rand(i + 200) * 4 + (Math.sin(t * Math.PI * 3) > 0.6 ? 5 : 0)));
    out.push({ t: i, success, failed });
  }
  return out;
}

// ---- formatters -----------------------------------------------------------
function fmtRuntime(s) {
  if (s == null) return "—";
  if (s < 60) return s + "s";
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}m ${r}s`;
}
function fmtTime(d) {
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  const ss = String(d.getSeconds()).padStart(2, "0");
  return `${hh}:${mm}:${ss}`;
}
function fmtFidelity(f) {
  if (f == null) return "—";
  return (f * 100).toFixed(2) + "%";
}

// ---- design tokens / inline styles ----------------------------------------
const palette = {
  completed: "var(--green)",
  running: "var(--accent)",
  queued: "var(--amber)",
  failed: "var(--red)",
};

// ---- components -----------------------------------------------------------
function StatusPill({ status }) {
  const color = palette[status] || "var(--fg-2)";
  const dotPulse = status === "running";
  return (
    <span style={{
      display: "inline-flex",
      alignItems: "center",
      gap: 6,
      padding: "3px 8px 3px 7px",
      borderRadius: 4,
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      border: "1px solid color-mix(in oklch, " + color + " 28%, transparent)",
      color: color,
      fontFamily: "JetBrains Mono, monospace",
      fontSize: 11,
      fontWeight: 500,
      letterSpacing: "0.02em",
      textTransform: "uppercase",
      whiteSpace: "nowrap",
    }}>
      <span style={{
        width: 6, height: 6, borderRadius: 999,
        background: color,
        boxShadow: dotPulse ? `0 0 0 0 ${color}` : "none",
        animation: dotPulse ? "pulse 1.6s ease-out infinite" : "none",
      }} />
      {status}
    </span>
  );
}

function MetricCard({ label, value, unit, delta, sparkline }) {
  return (
    <div style={{
      background: "var(--bg-1)",
      border: "1px solid var(--line-soft)",
      borderRadius: "var(--radius-lg)",
      padding: "16px 18px",
      display: "flex",
      flexDirection: "column",
      gap: 8,
      minWidth: 0,
    }}>
      <div style={{
        color: "var(--fg-2)",
        fontSize: 11,
        fontWeight: 500,
        letterSpacing: "0.08em",
        textTransform: "uppercase",
        fontFamily: "JetBrains Mono, monospace",
      }}>{label}</div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
        <div className="mono" style={{ fontSize: 28, fontWeight: 600, color: "var(--fg-0)", letterSpacing: "-0.02em" }}>
          {value}
        </div>
        {unit && <div className="mono" style={{ fontSize: 12, color: "var(--fg-2)" }}>{unit}</div>}
      </div>
      {delta != null && (
        <div className="mono" style={{
          fontSize: 11,
          color: delta >= 0 ? "var(--green)" : "var(--red)",
        }}>
          {delta >= 0 ? "▲" : "▼"} {Math.abs(delta).toFixed(1)}% <span style={{ color: "var(--fg-3)" }}>vs. prev 1h</span>
        </div>
      )}
      {sparkline && (
        <svg viewBox="0 0 120 28" preserveAspectRatio="none" style={{ width: "100%", height: 28, marginTop: 4 }}>
          <path d={sparkline} stroke="var(--accent)" strokeWidth="1.2" fill="none" vectorEffect="non-scaling-stroke" />
        </svg>
      )}
    </div>
  );
}

function buildSparkPath(values) {
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = Math.max(1, max - min);
  return values.map((v, i) => {
    const x = (i / (values.length - 1)) * 120;
    const y = 26 - ((v - min) / range) * 24;
    return (i === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1);
  }).join(" ");
}

// ---- Throughput chart -----------------------------------------------------
function ThroughputChart({ data }) {
  const W = 1200;
  const H = 360;
  const pad = { top: 24, right: 24, bottom: 36, left: 48 };
  const innerW = W - pad.left - pad.right;
  const innerH = H - pad.top - pad.bottom;

  const maxY = useMemo(() => {
    const m = Math.max(...data.map(d => d.success + d.failed));
    return Math.ceil(m / 10) * 10;
  }, [data]);

  const xFor = (i) => pad.left + (i / (data.length - 1)) * innerW;
  const yFor = (v) => pad.top + innerH - (v / maxY) * innerH;

  const successPath = data.map((d, i) => (i === 0 ? "M" : "L") + xFor(i).toFixed(1) + " " + yFor(d.success).toFixed(1)).join(" ");
  const successArea = successPath + ` L ${xFor(data.length - 1).toFixed(1)} ${(pad.top + innerH).toFixed(1)} L ${pad.left} ${(pad.top + innerH).toFixed(1)} Z`;
  const failedPath = data.map((d, i) => (i === 0 ? "M" : "L") + xFor(i).toFixed(1) + " " + yFor(d.failed).toFixed(1)).join(" ");

  // hover
  const [hover, setHover] = useState(null);
  const ref = useRef(null);

  function onMove(e) {
    const rect = ref.current.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * W;
    if (x < pad.left || x > pad.left + innerW) { setHover(null); return; }
    const idx = Math.round(((x - pad.left) / innerW) * (data.length - 1));
    setHover(Math.max(0, Math.min(data.length - 1, idx)));
  }

  // y-ticks
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(p => Math.round(maxY * p));

  return (
    <div style={{
      background: "var(--bg-1)",
      border: "1px solid var(--line-soft)",
      borderRadius: "var(--radius-lg)",
      padding: 20,
    }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, marginBottom: 12 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: "var(--fg-0)" }}>Job throughput</div>
            <div className="mono" style={{ fontSize: 11, color: "var(--fg-3)", textTransform: "uppercase", letterSpacing: "0.08em" }}>· last 4h · 5min buckets</div>
          </div>
          <div className="mono" style={{ fontSize: 11, color: "var(--fg-3)", marginTop: 4 }}>
            jobs completed per interval, across all backends
          </div>
        </div>
        <div style={{ display: "flex", gap: 16 }}>
          <LegendDot color="var(--accent)" label="Succeeded" />
          <LegendDot color="var(--red)" label="Failed" dashed />
        </div>
      </div>

      <svg
        ref={ref}
        viewBox={`0 0 ${W} ${H}`}
        preserveAspectRatio="none"
        style={{ width: "100%", height: 360, display: "block", cursor: "crosshair" }}
        onMouseMove={onMove}
        onMouseLeave={() => setHover(null)}
      >
        <defs>
          <linearGradient id="successGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.28" />
            <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
          </linearGradient>
        </defs>

        {/* y gridlines */}
        {yTicks.map((v, i) => (
          <g key={i}>
            <line
              x1={pad.left} x2={W - pad.right}
              y1={yFor(v)} y2={yFor(v)}
              stroke="var(--line-soft)"
              strokeDasharray={i === 0 ? "" : "2 4"}
              strokeWidth="1"
            />
            <text
              x={pad.left - 10} y={yFor(v) + 4}
              textAnchor="end"
              fontFamily="JetBrains Mono, monospace"
              fontSize="10"
              fill="var(--fg-3)"
            >{v}</text>
          </g>
        ))}

        {/* x ticks (every 8) */}
        {data.map((d, i) => i % 8 === 0 && (
          <text key={i}
            x={xFor(i)} y={H - pad.bottom + 18}
            textAnchor="middle"
            fontFamily="JetBrains Mono, monospace"
            fontSize="10"
            fill="var(--fg-3)"
          >
            {`-${Math.round((data.length - 1 - i) * 5)}m`}
          </text>
        ))}

        {/* success area + line */}
        <path d={successArea} fill="url(#successGrad)" />
        <path d={successPath} stroke="var(--accent)" strokeWidth="1.75" fill="none" vectorEffect="non-scaling-stroke" />

        {/* failed line */}
        <path d={failedPath} stroke="var(--red)" strokeWidth="1.5" fill="none" strokeDasharray="3 3" vectorEffect="non-scaling-stroke" />

        {/* hover */}
        {hover != null && (
          <g>
            <line
              x1={xFor(hover)} x2={xFor(hover)}
              y1={pad.top} y2={pad.top + innerH}
              stroke="var(--fg-2)"
              strokeDasharray="2 3"
              strokeWidth="1"
            />
            <circle cx={xFor(hover)} cy={yFor(data[hover].success)} r="4" fill="var(--bg-0)" stroke="var(--accent)" strokeWidth="2" />
            <circle cx={xFor(hover)} cy={yFor(data[hover].failed)} r="3" fill="var(--bg-0)" stroke="var(--red)" strokeWidth="1.5" />

            <g transform={`translate(${Math.min(xFor(hover) + 12, W - pad.right - 160)}, ${pad.top + 8})`}>
              <rect width="160" height="62" rx="6" fill="var(--bg-2)" stroke="var(--line)" />
              <text x="12" y="20" fontFamily="JetBrains Mono, monospace" fontSize="10" fill="var(--fg-3)" letterSpacing="0.06em">
                {`T-${Math.round((data.length - 1 - hover) * 5)}m`}
              </text>
              <circle cx="14" cy="36" r="3" fill="var(--accent)" />
              <text x="24" y="40" fontFamily="JetBrains Mono, monospace" fontSize="11" fill="var(--fg-0)">
                succ <tspan fontWeight="600">{data[hover].success}</tspan>
              </text>
              <circle cx="14" cy="52" r="3" fill="var(--red)" />
              <text x="24" y="56" fontFamily="JetBrains Mono, monospace" fontSize="11" fill="var(--fg-0)">
                fail <tspan fontWeight="600">{data[hover].failed}</tspan>
              </text>
            </g>
          </g>
        )}
      </svg>
    </div>
  );
}

function LegendDot({ color, label, dashed }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "var(--fg-1)" }} className="mono">
      {dashed ? (
        <svg width="14" height="2"><line x1="0" y1="1" x2="14" y2="1" stroke={color} strokeWidth="2" strokeDasharray="3 2" /></svg>
      ) : (
        <span style={{ display: "inline-block", width: 10, height: 2, background: color }} />
      )}
      {label}
    </div>
  );
}

// ---- Jobs table -----------------------------------------------------------
function JobsTable({ jobs, filter, onFilter, search, onSearch }) {
  const filtered = jobs.filter(j => {
    if (filter !== "all" && j.status !== filter) return false;
    if (search && !(j.id.includes(search) || j.backend.includes(search) || j.user.includes(search))) return false;
    return true;
  });

  const counts = useMemo(() => {
    const c = { all: jobs.length, completed: 0, running: 0, queued: 0, failed: 0 };
    jobs.forEach(j => c[j.status]++);
    return c;
  }, [jobs]);

  return (
    <div style={{
      background: "var(--bg-1)",
      border: "1px solid var(--line-soft)",
      borderRadius: "var(--radius-lg)",
      overflow: "hidden",
    }}>
      {/* table header bar */}
      <div style={{
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        padding: "14px 18px",
        borderBottom: "1px solid var(--line-soft)",
        gap: 16,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>Jobs</div>
          <div className="mono" style={{ fontSize: 11, color: "var(--fg-3)" }}>{filtered.length} of {jobs.length}</div>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <FilterTabs filter={filter} onFilter={onFilter} counts={counts} />
          <div style={{
            display: "flex",
            alignItems: "center",
            gap: 6,
            background: "var(--bg-2)",
            border: "1px solid var(--line-soft)",
            borderRadius: "var(--radius)",
            padding: "5px 10px",
            width: 220,
          }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--fg-3)" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input
              value={search}
              onChange={(e) => onSearch(e.target.value)}
              placeholder="search id, backend, user…"
              style={{
                background: "transparent",
                border: "none",
                outline: "none",
                color: "var(--fg-0)",
                fontFamily: "JetBrains Mono, monospace",
                fontSize: 11,
                width: "100%",
              }}
            />
          </div>
        </div>
      </div>

      <div style={{ overflowX: "auto" }}>
        <table style={{
          width: "100%",
          borderCollapse: "collapse",
          fontFamily: "JetBrains Mono, monospace",
          fontSize: 12,
        }}>
          <thead>
            <tr>
              {["Job ID", "Backend", "Status", "Qubits", "Shots", "Fidelity", "Runtime", "User", "Submitted"].map((h, i) => (
                <th key={i} style={{
                  textAlign: i >= 3 && i <= 6 ? "right" : "left",
                  padding: "10px 16px",
                  color: "var(--fg-3)",
                  fontWeight: 500,
                  fontSize: 10,
                  textTransform: "uppercase",
                  letterSpacing: "0.1em",
                  borderBottom: "1px solid var(--line)",
                  background: "var(--bg-1)",
                  position: "sticky",
                  top: 0,
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((j, idx) => (
              <tr key={j.id}
                style={{
                  borderBottom: "1px solid var(--line-soft)",
                  background: idx % 2 === 0 ? "transparent" : "color-mix(in oklch, var(--bg-2) 30%, transparent)",
                  transition: "background 120ms",
                }}
                onMouseEnter={(e) => e.currentTarget.style.background = "var(--bg-2)"}
                onMouseLeave={(e) => e.currentTarget.style.background = idx % 2 === 0 ? "transparent" : "color-mix(in oklch, var(--bg-2) 30%, transparent)"}
              >
                <td style={cellStyle()}>
                  <span style={{ color: "var(--accent)" }}>{j.id}</span>
                </td>
                <td style={cellStyle()}>
                  <span style={{ color: "var(--fg-1)" }}>{j.backend}</span>
                </td>
                <td style={cellStyle()}><StatusPill status={j.status} /></td>
                <td style={cellStyle("right")}><span style={{ color: "var(--fg-0)" }}>{j.qubits}</span></td>
                <td style={cellStyle("right")}><span style={{ color: "var(--fg-1)" }}>{j.shots.toLocaleString()}</span></td>
                <td style={cellStyle("right")}>
                  {j.fidelity != null
                    ? <FidelityCell value={j.fidelity} />
                    : <span style={{ color: "var(--fg-3)" }}>—</span>}
                </td>
                <td style={cellStyle("right")}>
                  <span style={{ color: j.status === "queued" ? "var(--fg-3)" : "var(--fg-1)" }}>{fmtRuntime(j.runtime)}</span>
                </td>
                <td style={cellStyle()}>
                  <span style={{ color: "var(--fg-1)" }}>{j.user}</span>
                </td>
                <td style={cellStyle()}>
                  <span style={{ color: "var(--fg-2)" }}>{fmtTime(j.submitted)}</span>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan="9" style={{ padding: 32, textAlign: "center", color: "var(--fg-3)" }}>No jobs match.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function FidelityCell({ value }) {
  const pct = value * 100;
  const color = value >= 0.95 ? "var(--green)" : value >= 0.88 ? "var(--accent)" : "var(--amber)";
  return (
    <div style={{ display: "inline-flex", alignItems: "center", gap: 8, justifyContent: "flex-end" }}>
      <div style={{
        width: 44, height: 4, borderRadius: 2,
        background: "var(--bg-3)",
        overflow: "hidden",
      }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color }} />
      </div>
      <span style={{ color: "var(--fg-0)", minWidth: 52, textAlign: "right" }}>{fmtFidelity(value)}</span>
    </div>
  );
}

function cellStyle(align = "left") {
  return {
    padding: "11px 16px",
    textAlign: align,
    whiteSpace: "nowrap",
    verticalAlign: "middle",
  };
}

function FilterTabs({ filter, onFilter, counts }) {
  const tabs = [
    { id: "all", label: "All" },
    { id: "running", label: "Running" },
    { id: "queued", label: "Queued" },
    { id: "completed", label: "Completed" },
    { id: "failed", label: "Failed" },
  ];
  return (
    <div style={{
      display: "inline-flex",
      background: "var(--bg-2)",
      border: "1px solid var(--line-soft)",
      borderRadius: "var(--radius)",
      padding: 2,
    }}>
      {tabs.map(t => {
        const active = filter === t.id;
        return (
          <button key={t.id}
            onClick={() => onFilter(t.id)}
            style={{
              background: active ? "var(--bg-3)" : "transparent",
              border: "none",
              color: active ? "var(--fg-0)" : "var(--fg-2)",
              fontFamily: "JetBrains Mono, monospace",
              fontSize: 11,
              padding: "5px 10px",
              borderRadius: 4,
              cursor: "pointer",
              transition: "color 120ms",
              display: "inline-flex",
              alignItems: "center",
              gap: 6,
            }}
          >
            {t.label}
            <span style={{ color: "var(--fg-3)", fontSize: 10 }}>{counts[t.id]}</span>
          </button>
        );
      })}
    </div>
  );
}

// ---- top bar --------------------------------------------------------------
function TopBar({ live, onToggleLive, lastSync }) {
  return (
    <header style={{
      display: "flex",
      alignItems: "center",
      justifyContent: "space-between",
      padding: "16px 28px",
      borderBottom: "1px solid var(--line-soft)",
      background: "color-mix(in oklch, var(--bg-0) 80%, transparent)",
      backdropFilter: "blur(8px)",
      position: "sticky",
      top: 0,
      zIndex: 10,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <Logo />
        <div style={{
          width: 1, height: 20, background: "var(--line)",
        }} />
        <nav style={{ display: "flex", gap: 4 }}>
          {["Overview", "Jobs", "Backends", "Circuits", "Logs"].map((n, i) => (
            <a key={n} href="#" style={{
              fontSize: 12,
              fontWeight: 500,
              color: i === 0 ? "var(--fg-0)" : "var(--fg-2)",
              padding: "6px 10px",
              borderRadius: 4,
              background: i === 0 ? "var(--bg-2)" : "transparent",
              textDecoration: "none",
            }}>{n}</a>
          ))}
        </nav>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <button onClick={onToggleLive} style={{
          display: "inline-flex",
          alignItems: "center",
          gap: 8,
          background: live ? "var(--accent-dim)" : "var(--bg-2)",
          border: "1px solid " + (live ? "var(--accent-line)" : "var(--line-soft)"),
          color: live ? "var(--accent)" : "var(--fg-1)",
          fontFamily: "JetBrains Mono, monospace",
          fontSize: 11,
          padding: "5px 12px",
          borderRadius: "var(--radius)",
          cursor: "pointer",
          letterSpacing: "0.04em",
        }}>
          <span style={{
            width: 6, height: 6, borderRadius: 999,
            background: live ? "var(--accent)" : "var(--fg-3)",
            animation: live ? "pulse 1.6s ease-out infinite" : "none",
          }} />
          {live ? "LIVE" : "PAUSED"}
        </button>
        <div className="mono" style={{ fontSize: 11, color: "var(--fg-3)" }}>
          synced {fmtTime(lastSync)}
        </div>
        <div style={{
          width: 28, height: 28,
          borderRadius: 999,
          background: "linear-gradient(135deg, var(--accent), var(--magenta))",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 11, fontWeight: 600, color: "var(--bg-0)",
        }}>AC</div>
      </div>
    </header>
  );
}

function Logo() {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="var(--accent)" strokeWidth="1.4" />
        <ellipse cx="12" cy="12" rx="9" ry="3.5" stroke="var(--accent)" strokeWidth="1.1" opacity="0.7" />
        <ellipse cx="12" cy="12" rx="9" ry="3.5" stroke="var(--magenta)" strokeWidth="1.1" opacity="0.7" transform="rotate(60 12 12)" />
        <circle cx="12" cy="12" r="2" fill="var(--accent)" />
      </svg>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
        <span className="mono" style={{ fontSize: 14, fontWeight: 600, letterSpacing: "0.04em" }}>QOBS</span>
        <span className="mono" style={{ fontSize: 10, color: "var(--fg-3)", textTransform: "uppercase", letterSpacing: "0.12em" }}>v2.4</span>
      </div>
    </div>
  );
}

// ---- App ------------------------------------------------------------------
function App() {
  const [jobs] = useState(() => generateJobs(28));
  const [throughput] = useState(() => generateThroughput(48));
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [live, setLive] = useState(true);
  const [lastSync, setLastSync] = useState(new Date());

  useEffect(() => {
    if (!live) return;
    const id = setInterval(() => setLastSync(new Date()), 4000);
    return () => clearInterval(id);
  }, [live]);

  const stats = useMemo(() => {
    const total = jobs.length;
    const running = jobs.filter(j => j.status === "running").length;
    const queued = jobs.filter(j => j.status === "queued").length;
    const completed = jobs.filter(j => j.status === "completed");
    const avgFidelity = completed.length
      ? completed.reduce((s, j) => s + j.fidelity, 0) / completed.length
      : 0;
    const success = total ? completed.length / total : 0;
    return { total, running, queued, avgFidelity, success };
  }, [jobs]);

  return (
    <div>
      <TopBar live={live} onToggleLive={() => setLive(l => !l)} lastSync={lastSync} />

      <main style={{ padding: "28px 28px 48px", maxWidth: 1480, margin: "0 auto" }}>
        {/* page header */}
        <div style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
            <h1 style={{
              fontSize: 22, fontWeight: 600, margin: 0, letterSpacing: "-0.01em",
            }}>Quantum Job Observability</h1>
            <span className="mono" style={{
              fontSize: 10, color: "var(--accent)",
              border: "1px solid var(--accent-line)", padding: "2px 6px",
              borderRadius: 4, textTransform: "uppercase", letterSpacing: "0.1em",
              background: "var(--accent-dim)",
            }}>prod</span>
          </div>
          <p style={{
            margin: 0, color: "var(--fg-2)", fontSize: 13,
          }}>
            Real-time monitoring of quantum circuit executions across QPU backends — track fidelity, queue depth and runtime in one place.
          </p>
        </div>

        {/* metrics row */}
        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(4, 1fr)",
          gap: 14,
          marginBottom: 18,
        }}>
          <MetricCard
            label="Active jobs"
            value={stats.running}
            unit={`/ ${stats.total}`}
            delta={6.4}
            sparkline={buildSparkPath([3,4,4,5,4,6,5,7,6,8,7,9,stats.running])}
          />
          <MetricCard
            label="Queue depth"
            value={stats.queued}
            unit="jobs"
            delta={-12.3}
            sparkline={buildSparkPath([14,12,11,9,10,8,7,6,5,7,6,5,stats.queued])}
          />
          <MetricCard
            label="Avg fidelity"
            value={(stats.avgFidelity * 100).toFixed(2)}
            unit="%"
            delta={0.8}
            sparkline={buildSparkPath([91,92,91,93,92,94,93,94,95,94,95,96,stats.avgFidelity * 100])}
          />
          <MetricCard
            label="Success rate"
            value={(stats.success * 100).toFixed(1)}
            unit="%"
            delta={2.1}
            sparkline={buildSparkPath([84,86,85,87,86,88,87,89,88,90,91,90,stats.success * 100])}
          />
        </div>

        {/* chart */}
        <div style={{ marginBottom: 18 }}>
          <ThroughputChart data={throughput} />
        </div>

        {/* table */}
        <JobsTable
          jobs={jobs}
          filter={filter}
          onFilter={setFilter}
          search={search}
          onSearch={setSearch}
        />

        <div className="mono" style={{
          color: "var(--fg-3)", fontSize: 10, marginTop: 24,
          display: "flex", justifyContent: "space-between", letterSpacing: "0.06em",
        }}>
          <span>QOBS · quantum job observability</span>
          <span>region us-east-1 · cluster qpu-prod-04</span>
        </div>
      </main>

      <style>{`
        @keyframes pulse {
          0% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
          70% { box-shadow: 0 0 0 6px transparent; opacity: 0.6; }
          100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
        }
        ::selection { background: var(--accent-dim); color: var(--fg-0); }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
